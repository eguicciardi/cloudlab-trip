services:
  cloudlab-trek:
    image: mauriceboe/trek:latest
    container_name: cloudlab-trek
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      TZ: ${TZ}
    volumes:
      - cloudlab-trek-data:/app/data
      - cloudlab-trek-uploads:/app/uploads
    networks:
      - cloudlab-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cloudlab-trek-backup:
    image: litestream/litestream
    container_name: cloudlab-trek-backup
    restart: unless-stopped
    command: replicate
    volumes:
      - cloudlab-trek-data:/data
      - ./litestream.yml:/etc/litestream.yml
    env_file:
      - .env
    depends_on:
      cloudlab-trek:
        condition: service_healthy
    networks:
      - cloudlab-network

volumes:
  cloudlab-trek-data:
  cloudlab-trek-uploads:

networks:
  cloudlab-network:
    external: true
